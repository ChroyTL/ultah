<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Special Gift</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Georgia, serif;
      height: 100vh;
      background: #f6efe6;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .page {
      display: none;
      width: 90%;
      max-width: 400px;
      animation: fade 1.2s ease;
    }

    .active {
      display: block;
    }

    .small {
      font-size: 14px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #7b5b44;
      margin-bottom: 15px;
    }

    .big {
      font-size: 55px;
      font-weight: bold;
      color: #2a1a12;
      margin: 0;
      line-height: 1;
    }

    .name {
      font-size: 45px;
      font-weight: bold;
      color: #b07b5c;
      margin-top: 10px;
    }

    .wait {
      font-size: 45px;
      font-style: italic;
      color: #2a1a12;
    }

    .btn {
      margin-top: 30px;
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 50px;
      background: #b07b5c;
      color: white;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #8d5c44;
      transform: scale(1.03);
    }

    .book {
      font-size: 80px;
      margin-bottom: 20px;
    }

    @keyframes fade {
      from {opacity: 0; transform: translateY(25px);}
      to {opacity: 1; transform: translateY(0);}
    }

    audio {
      display: none;
    }
  </style>
</head>

<body>

  <!-- AUDIO -->
  <audio id="music" loop>
    <source src="aboutyou.mp3" type="audio/mpeg">
  </audio>

  <!-- PAGE 1 -->
  <div class="page active" id="page1">
    <div class="book">📖</div>
    <div class="small">A SPECIAL GIFT FOR YOU</div>
    <button class="btn" onclick="startStory()">OPEN STORY BOOK</button>
  </div>

  <!-- PAGE 2 -->
  <div class="page" id="page2">
    <div class="wait">"Wait a second..."</div>
  </div>

  <!-- PAGE 3 -->
  <div class="page" id="page3">
    <div class="small">SOMEONE MADE THIS FOR YOU</div>
  </div>

  <!-- PAGE 4 -->
  <div class="page" id="page4">
    <div class="small">IT'S YOUR BIG DAY</div>
    <h1 class="big">HAPPY<br>BIRTHDAY</h1>
    <div class="name">YTTA</div>
  </div>

  <script>
    function showPage(num) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.getElementById("page" + num).classList.add("active");
    }

    function startStory() {
      // PLAY MUSIC
      const music = document.getElementById("music");
      music.play();

      // AUTO PAGE TRANSITION
      showPage(2);

      setTimeout(() => {
        showPage(3);
      }, 2500);

      setTimeout(() => {
        showPage(4);
      }, 4500);
    }
  </script>

</body>
</html>
